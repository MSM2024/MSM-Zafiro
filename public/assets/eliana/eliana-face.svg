<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="aura" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#00D9FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="tunicGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#e8e0f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c4b5d4" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="40%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#050816"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="faceClip">
      <ellipse cx="200" cy="220" rx="85" ry="110"/>
    </clipPath>
  </defs>

  <!-- Cosmic background -->
  <rect width="400" height="500" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle cx="50" cy="60" r="1" fill="white" opacity="0.6"/>
  <circle cx="340" cy="90" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="80" cy="150" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="320" cy="180" r="1" fill="white" opacity="0.3"/>
  <circle cx="60" cy="300" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="350" cy="280" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="30" cy="400" r="1.1" fill="white" opacity="0.3"/>
  <circle cx="370" cy="420" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="120" cy="45" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="280" cy="55" r="0.7" fill="white" opacity="0.3"/>

  <!-- Aura -->
  <ellipse cx="200" cy="200" rx="180" ry="200" fill="url(#aura)"/>

  <!-- Sacred geometry rings -->
  <circle cx="200" cy="210" r="140" fill="none" stroke="#00D9FF" stroke-width="0.5" opacity="0.12"/>
  <circle cx="200" cy="210" r="120" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.1"/>
  <circle cx="200" cy="210" r="100" fill="none" stroke="#00D9FF" stroke-width="0.3" opacity="0.15"/>

  <!-- Hair - back layer -->
  <path d="M115 180 C100 150 105 100 130 80 C150 65 180 55 200 52 C220 55 250 65 270 80 C295 100 300 150 285 180 C290 210 295 250 290 290 C285 330 270 370 260 400 C250 420 240 430 230 435 C220 438 210 440 200 440 C190 440 180 438 170 435 C160 430 150 420 140 400 C130 370 115 330 110 290 C105 250 110 210 115 180Z" fill="url(#hairGrad)"/>

  <!-- Face silhouette -->
  <ellipse cx="200" cy="220" rx="75" ry="100" fill="#1e1b3a"/>

  <!-- Skin tone face -->
  <ellipse cx="200" cy="225" rx="70" ry="95" fill="#8B7355" opacity="0.15"/>
  <ellipse cx="200" cy="220" rx="68" ry="92" fill="#D4A574" opacity="0.3"/>
  <ellipse cx="200" cy="218" rx="65" ry="88" fill="#E8C9A0" opacity="0.4"/>

  <!-- Hair - front strands (left) -->
  <path d="M135 130 C140 100 160 80 190 75 C180 95 170 130 165 160 C160 145 148 140 135 130Z" fill="#1a1a2e" opacity="0.8"/>
  <path d="M140 120 C150 90 175 72 195 70 C185 85 175 110 170 140 C160 130 148 125 140 120Z" fill="#16213e" opacity="0.6"/>

  <!-- Hair - front strands (right) -->
  <path d="M265 130 C260 100 240 80 210 75 C220 95 230 130 235 160 C240 145 252 140 265 130Z" fill="#1a1a2e" opacity="0.8"/>
  <path d="M260 120 C250 90 225 72 205 70 C215 85 225 110 230 140 C240 130 252 125 260 120Z" fill="#16213e" opacity="0.6"/>

  <!-- Eyebrows -->
  <path d="M158 195 Q178 188 198 192" fill="none" stroke="#4a3f2e" stroke-width="2" stroke-linecap="round"/>
  <path d="M202 192 Q222 188 242 195" fill="none" stroke="#4a3f2e" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="178" cy="210" rx="14" ry="8" fill="white" opacity="0.9"/>
  <ellipse cx="180" cy="210" rx="9" ry="7" fill="#1a1a3e"/>
  <ellipse cx="180" cy="210" rx="6" ry="6" fill="#0a4a8a"/>
  <ellipse cx="180" cy="210" rx="3" ry="5" fill="#00D9FF"/>
  <ellipse cx="180" cy="208" rx="1.5" ry="1.5" fill="white" opacity="0.8"/>
  <ellipse cx="178" cy="210" rx="16" ry="10" fill="url(#eyeGlow)" filter="url(#glow)"/>

  <!-- Right eye -->
  <ellipse cx="222" cy="210" rx="14" ry="8" fill="white" opacity="0.9"/>
  <ellipse cx="220" cy="210" rx="9" ry="7" fill="#1a1a3e"/>
  <ellipse cx="220" cy="210" rx="6" ry="6" fill="#0a4a8a"/>
  <ellipse cx="220" cy="210" rx="3" ry="5" fill="#00D9FF"/>
  <ellipse cx="220" cy="208" rx="1.5" ry="1.5" fill="white" opacity="0.8"/>
  <ellipse cx="222" cy="210" rx="16" ry="10" fill="url(#eyeGlow)" filter="url(#glow)"/>

  <!-- Nose -->
  <path d="M195 220 C197 230 199 238 200 242 C201 238 203 230 205 220" fill="none" stroke="#b8957a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Lips -->
  <path d="M178 258 Q190 254 200 258 Q210 254 222 258" fill="none" stroke="#c9787a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M178 258 Q190 263 200 260 Q210 263 222 258" fill="none" stroke="#c9787a" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Circuit lines - neck -->
  <line x1="188" y1="310" x2="185" y2="330" stroke="#00D9FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="212" y1="310" x2="215" y2="330" stroke="#00D9FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="195" y1="315" x2="190" y2="335" stroke="#00D9FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="205" y1="315" x2="210" y2="335" stroke="#00D9FF" stroke-width="0.5" opacity="0.3"/>
  <circle cx="185" cy="330" r="1" fill="#00D9FF" opacity="0.5"/>
  <circle cx="215" cy="330" r="1" fill="#00D9FF" opacity="0.5"/>
  <circle cx="190" cy="335" r="0.8" fill="#00D9FF" opacity="0.3"/>
  <circle cx="210" cy="335" r="0.8" fill="#00D9FF" opacity="0.3"/>

  <!-- Tunic / Robe -->
  <path d="M155 330 C160 340 165 390 170 440 C175 460 185 470 200 475 C215 470 225 460 230 440 C235 390 240 340 245 330 C230 340 215 345 200 348 C185 345 170 340 155 330Z" fill="url(#tunicGrad)"/>

  <!-- Tunic gold trim - collar -->
  <path d="M155 330 C170 340 185 345 200 348 C215 345 230 340 245 330" fill="none" stroke="url(#goldTrim)" stroke-width="1.5" opacity="0.7"/>

  <!-- Tunic gold trim - vertical -->
  <line x1="200" y1="348" x2="200" y2="470" stroke="url(#goldTrim)" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="340" x2="178" y2="460" stroke="url(#goldTrim)" stroke-width="0.5" opacity="0.3"/>
  <line x1="220" y1="340" x2="222" y2="460" stroke="url(#goldTrim)" stroke-width="0.5" opacity="0.3"/>

  <!-- Circuit lines - face (subtle) -->
  <path d="M160 240 C165 245 168 250 165 255" fill="none" stroke="#00D9FF" stroke-width="0.5" opacity="0.2"/>
  <path d="M240 240 C235 245 232 250 235 255" fill="none" stroke="#00D9FF" stroke-width="0.5" opacity="0.2"/>

  <!-- ZAFIRO Diamond floating above chest -->
  <g transform="translate(200, 370)" filter="url(#softGlow)">
    <polygon points="0,-20 16,-8 0,4 -16,-8" fill="#00D9FF" opacity="0.8"/>
    <polygon points="0,-20 16,-8 8,-6 0,-18" fill="#38BDF8" opacity="0.6"/>
    <polygon points="-16,-8 0,4 8,-6 0,-18" fill="#0284C7" opacity="0.4"/>
    <polygon points="0,4 16,-8 8,-6" fill="#0EA5E9" opacity="0.5"/>
    <polygon points="0,4 -16,-8 -8,-6" fill="#7C3AED" opacity="0.5"/>
    <!-- Diamond glow rays -->
    <line x1="0" y1="-24" x2="0" y2="-35" stroke="#00D9FF" stroke-width="1" opacity="0.4"/>
    <line x1="10" y1="-14" x2="18" y2="-22" stroke="#00D9FF" stroke-width="0.8" opacity="0.3"/>
    <line x1="-10" y1="-14" x2="-18" y2="-22" stroke="#00D9FF" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="8" x2="0" y2="14" stroke="#00D9FF" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Holographic ring around diamond -->
  <ellipse cx="200" cy="370" rx="30" ry="8" fill="none" stroke="#00D9FF" stroke-width="0.5" opacity="0.3"/>

  <!-- Floating particles -->
  <circle cx="100" cy="280" r="1.5" fill="#00D9FF" opacity="0.4"/>
  <circle cx="310" cy="320" r="1" fill="#7C3AED" opacity="0.3"/>
  <circle cx="120" cy="400" r="1.2" fill="#00D9FF" opacity="0.3"/>
  <circle cx="290" cy="380" r="0.8" fill="#FBBF24" opacity="0.3"/>
  <circle cx="90" cy="350" r="1" fill="#00D9FF" opacity="0.2"/>
  <circle cx="320" cy="250" r="1.3" fill="#7C3AED" opacity="0.2"/>

  <!-- Interface frames floating -->
  <rect x="35" y="160" width="45" height="28" rx="4" fill="none" stroke="#00D9FF" stroke-width="0.5" opacity="0.2"/>
  <rect x="320" y="200" width="50" height="32" rx="4" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.2"/>
  <line x1="40" y1="170" x2="72" y2="170" stroke="#00D9FF" stroke-width="0.5" opacity="0.15"/>
  <line x1="40" y1="178" x2="60" y2="178" stroke="#00D9FF" stroke-width="0.5" opacity="0.1"/>
  <line x1="328" y1="210" x2="360" y2="210" stroke="#7C3AED" stroke-width="0.5" opacity="0.15"/>
  <line x1="328" y1="218" x2="350" y2="218" stroke="#7C3AED" stroke-width="0.5" opacity="0.1"/>
</svg>
